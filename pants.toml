[GLOBAL]
pants_version = "2.17.1"
backend_packages = ["pants.backend.python"]

[source]
root_patterns = [
    "/apps/*/src",
    "/apps/*/tests",
    "/pkgs/*/src",
    "/pkgs/*/tests",
    "/pkgs",
]

[python]
interpreter_constraints = ["==3.11.*"]

[python-infer]
use_rust_parser = true

[coverage-py]
report = "xml"
fail_under = 80
